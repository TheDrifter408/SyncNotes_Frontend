<svg width="100%" height="100%" viewBox="0 0 100 100" role="img" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(50, 50)">
    <!-- Top arc left→right -->
    <path d="M-30,0 A30,30 0 0,1 30,0" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="30,0 22,-8 22,8" fill="currentColor" transform="rotate(-15,30,0)"/>
    <!-- Bottom arc right→left -->
    <path d="M30,0 A30,30 0 0,1 -30,0" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-30,0 -22,-8 -22,8" fill="currentColor" transform="rotate(-195,-30,0)"/>
    <!-- Note lines -->
    <line x1="-16" y1="-6" x2="16" y2="-6" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="1" x2="8" y2="1" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="8" x2="12" y2="8" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>